[build]
  command = "npm run build"
  publish = "build/client"

[build.environment]
  # Node 22+ has native WebSocket, required by @supabase/realtime-js (pulled in
  # by supabase-js). On Node 20 the function crashes at createClient().
  NODE_VERSION = "22"

[dev]
  command = "npm run dev"
  framework = "vite"
  targetPort = 3000
